name: ⚛️ Frontend CI (React + Vite)

# Configuración de los disparadores (Cuándo se despierta este robot)
on:
  push:
    branches: [ main, development ]
    paths:
      - 'frontend/**' # 💡 Solo se activa si los cambios ocurren dentro de la carpeta frontend
  pull_request:
    branches: [ main, development ]
    paths:
      - 'frontend/**'

jobs:
  build-frontend:
    runs-on: ubuntu-latest # Usamos el mismo entorno Linux virtual en la nube

    steps:
    # Paso 1: Clonar y descargar el código de tu proyecto
    - name: 📂 Descargar código
      uses: actions/checkout@v4

    # Paso 2: Configurar el entorno de Node.js en la versión estable v20
    - name: 🛠️ Configurar Node.js v20
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # Paso 3: Guardar en caché los paquetes de npm para optimizar tiempos de ejecución futuros
    - name: 📦 Cachear dependencias de Node
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    # Paso 4: Instalar las dependencias del proyecto usando instalación limpia (ci)
    - name: 📥 Instalar dependencias
      run: |
        cd frontend
        npm ci

    # Paso 5: Validar la compilación de producción.
    # Este paso es crítico: compila todo a HTML, JS y CSS nativos. Si falla, no se puede desplegar.
    - name: 🚀 Validar compilación de producción (Build)
      run: |
        cd frontend
        npm run build